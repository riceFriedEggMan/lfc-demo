server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lfcpj?characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  main:
    allow-circular-references: true


mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

migrator:
  workersNum: 1000
  migrateStepMinutes: 60
  migrateTryLockMinutes: 1
  migrateSuccessExpireMinutes: 1
  timerDetailCacheMinutes: 2
  batchWorkersNum: 10

scheduler:
  bucketsNum: 5
  tryLockSeconds: 70
  tryLockGapMilliSeconds: 100
  successExpireSeconds: 130
  pool:
    corePoolSize: 10
    maxPoolSize: 100
    queueCapacity: 99999
    namePrefix: scheduler-

trigger:
  zrangeGapSeconds: 1
  workersNum: 10000
  pool:
    corePoolSize: 10
    maxPoolSize: 100
    queueCapacity: 99999
    namePrefix: trigger-